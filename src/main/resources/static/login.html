<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

<header>
    <div class="container">
        <h1>HOSTMan</h1>
        <button id="register-button">Register</button>
    </div>
</header>


<!-- LOGIN -->
<div id="login-panel" class="formulario">

    <form id="login-form">
        <div class="username">
            <label for="login-username">Username</label><br>
            <br><input type="text" id="login-username" required>
        </div>

        <div class="password">
            <br><label for="login-password">Password</label><br>
            <br><input type="password" id="login-password" required>
        </div>

        <button type="submit" class="btn">Login</button>

    </form>

    <div id="login-result" class="result"></div>
</div>

</body>
</html>
